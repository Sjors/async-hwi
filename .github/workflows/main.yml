name: CI

on: [pull_request]

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - uses: actions-rs/toolchain@v1
        with:
            toolchain: 1.88.0
            components: rustfmt, clippy
            override: true
      - name: rustfmt
        run: cargo fmt -- --check
      - name: clippy
        run: |
          sudo apt-get update &&
          sudo apt-get install libudev-dev pkg-config &&
          cargo clippy --all-features --all-targets -- -D warnings

  unit_tests:
    needs: linter
    strategy:
      matrix:
        toolchain:
          - 1.85.0
          - nightly
        os:
          - ubuntu-latest
          - macOS-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v2
      - name: Install Rust ${{ matrix.toolchain }} toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          override: true
          profile: minimal
      - name: Test on Rust ${{ matrix.toolchain }}
        if: matrix.os == 'windows-latest' || matrix.os == 'macOS-latest'
        run: cargo test --verbose --color always -- --nocapture
      - name: Test on Rust ${{ matrix.toolchain }}
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update &&
          sudo apt-get install libudev-dev pkg-config &&
          cargo test --verbose --color always -- --nocapture

  # ----------------------------------------------------------------------------
  # Build the Ledger Bitcoin app once so the Speculos job (and any future
  # jobs added to this workflow) can consume the .elf as an artifact without
  # rebuilding it.
  # ----------------------------------------------------------------------------
  ledger_app:
    name: build ledger bitcoin app
    needs: linter
    runs-on: ubuntu-latest
    # Pin to 5.3.2 (current `:latest`); SDK is new enough for app-bitcoin-new 2.4.6.
    container: ghcr.io/ledgerhq/ledger-app-builder/ledger-app-builder:5.3.2
    steps:
      - name: Build Ledger Bitcoin app (Nano X)
        # Pin to v2.4.6 (latest released `app-bitcoin-new` tag).
        # Speculos 0.26.6 is the matching simulator version.
        run: |
          git clone --branch '2.4.6' --depth 1 \
            https://github.com/LedgerHQ/app-bitcoin-new.git
          cd app-bitcoin-new
          make DEBUG=1 BOLOS_SDK="$NANOX_SDK"
      - uses: actions/upload-artifact@v4
        with:
          name: ledger_app
          path: app-bitcoin-new/bin/app.elf
          if-no-files-found: error
          retention-days: 1

  # ----------------------------------------------------------------------------
  # Drive the in-tree LedgerSimulator transport (src/ledger.rs) against a
  # real Ledger Bitcoin app running under Speculos. Catches regressions in
  # the APDU plumbing without needing physical hardware.
  # ----------------------------------------------------------------------------
  speculos:
    name: speculos integration
    needs: [unit_tests, ledger_app]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85.0
          cache: false

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - uses: ./.github/actions/setup-ledger-speculos

      - name: Launch Speculos
        run: |
          mkdir -p /tmp/speculos
          nohup speculos \
            --display headless \
            --apdu-port 9999 \
            ledger_app/app.elf \
            > /tmp/speculos/speculos.log 2>&1 &
          # Wait for the APDU port to come up.
          for _ in $(seq 1 60); do
            if (echo > /dev/tcp/127.0.0.1/9999) 2>/dev/null; then
              echo "speculos is up"
              exit 0
            fi
            sleep 1
          done
          echo "speculos did not come up; log:" >&2
          tail -200 /tmp/speculos/speculos.log >&2
          exit 1
        shell: bash

      - name: Run ignored speculos tests
        # --test-threads=1: Speculos exposes a single APDU socket; running
        # multiple connections in parallel interleaves request and response
        # frames.
        run: cargo test --features ledger --test ledger_speculos -- --ignored --nocapture --test-threads=1

      - name: Dump speculos log on failure
        if: failure()
        run: tail -n 200 /tmp/speculos/speculos.log || true

  # ----------------------------------------------------------------------------
  # Build the heavy artifacts shared by the hwi-rs end-to-end jobs below.
  #   - bitcoind+bitcoin-cli (used by both integration jobs)
  #   - hwi-rs --release      (used by both integration jobs; built once)
  # The ledger_app artifact is reused from the job above. These builders run
  # in parallel with linter/unit_tests/ledger_app to minimise wall-clock time.
  # ----------------------------------------------------------------------------
  bitcoind_builder:
    name: bitcoind builder
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: 'true'
      # Track Sjors's MuSig2/BIP388 branch so the same bitcoind artifact
      # exercises both the existing single-sig integration jobs and the
      # MuSig2 scenario added below. The branch tracks bitcoin/master
      # closely; revisit when the relevant changes land upstream.
      BITCOIN_CORE_REPO: https://github.com/Sjors/bitcoin.git
      BITCOIN_CORE_REF: 2025/06/musig2-power
    steps:
      - uses: actions/checkout@v4

      - name: Install Bitcoin Core build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkgconf python3 \
            libevent-dev libboost-dev ccache \
            capnproto libcapnp-dev \
            libsqlite3-dev

      - name: ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-bitcoin-${{ env.BITCOIN_CORE_REF }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-bitcoin-${{ env.BITCOIN_CORE_REF }}-
            ccache-${{ runner.os }}-bitcoin-

      - name: Checkout Bitcoin Core
        run: git clone --depth 1 --branch "$BITCOIN_CORE_REF" "$BITCOIN_CORE_REPO" bitcoin-core

      - name: Build Bitcoin Core (wallet + external signer)
        run: |
          cd bitcoin-core
          cmake -B build \
            -DENABLE_WALLET=ON \
            -DENABLE_EXTERNAL_SIGNER=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_BENCH=OFF \
            -DBUILD_GUI=OFF \
            -DBUILD_TX=OFF \
            -DBUILD_UTIL=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build -j "$(nproc)" --target bitcoind bitcoin-cli

      - name: Upload bitcoind artifact
        uses: actions/upload-artifact@v4
        with:
          name: bitcoind
          path: |
            bitcoin-core/build/bin/bitcoind
            bitcoin-core/build/bin/bitcoin-cli
          if-no-files-found: error
          retention-days: 1

  hwi_rs_builder:
    name: hwi-rs builder
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85.0
          cache: false
      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config
      - name: Build hwi-rs (release)
        run: cargo build -p hwi-rs --release
      - uses: actions/upload-artifact@v4
        with:
          name: hwi-rs
          path: target/release/hwi-rs
          if-no-files-found: error
          retention-days: 1

  # ----------------------------------------------------------------------------
  # Integration against the in-process software mock. Cheap, runs everywhere,
  # catches almost every protocol regression.
  # ----------------------------------------------------------------------------
  mock_integration:
    name: integration (mock)
    needs: [bitcoind_builder, hwi_rs_builder]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 libevent-dev libcapnp-1.0.1

      - uses: ./.github/actions/setup-bitcoind
      - uses: ./.github/actions/setup-hwi-rs

      - name: External signer scenario (regtest, mock)
        run: bash hwi-rs/tests/run-core-scenario.sh

  # ----------------------------------------------------------------------------
  # Same scenario as mock_integration, but driven against a Speculos-emulated
  # Ledger Nano X running the real Bitcoin app. Slower and more fragile, but
  # independent of the mock job.
  # ----------------------------------------------------------------------------
  speculos_integration:
    name: integration (speculos ledger)
    needs: [bitcoind_builder, ledger_app, hwi_rs_builder]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libevent-dev libcapnp-1.0.1

      - uses: ./.github/actions/setup-bitcoind
      - uses: ./.github/actions/setup-hwi-rs
      - uses: ./.github/actions/setup-ledger-speculos

      - name: External signer scenario (regtest, speculos)
        env:
          LEDGER_APP_ELF: ${{ github.workspace }}/ledger_app/app.elf
          SPECULOS: speculos
        run: bash hwi-rs/tests/run-core-scenario-speculos.sh

      - name: Dump speculos log on failure
        if: failure()
        run: |
          # Best effort — the scenario script writes speculos.log into the
          # bitcoind datadir, which is a mktemp. Search /tmp for it.
          find /tmp -maxdepth 4 -name 'speculos.log' -print -exec tail -n 200 {} \; 2>/dev/null || true

  # ----------------------------------------------------------------------------
  # Build the Coldcard `coldcard-mpy` simulator from upstream firmware (tag
  # pinned in `hwi-rs/tests/coldcard-sim/firmware-tag.txt`). The resulting
  # tarball is cached by tag + Dockerfile + patch hashes so later runs at
  # the same pin can skip rebuilding, and downstream jobs can restore that
  # same archive directly instead of bouncing it through an artifact upload.
  # ----------------------------------------------------------------------------
  coldcard_sim:
    name: build coldcard simulator
    needs: linter
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Read firmware tag
        id: pin
        run: |
          tag="$(tr -d '[:space:]' < hwi-rs/tests/coldcard-sim/firmware-tag.txt)"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check simulator archive cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          # Only check whether the final tarball exists in cache. The builder
          # job does not need to download it on hits; the integration job will
          # restore it for actual use.
          path: coldcard-sim.tar.gz
          key: coldcard-sim-archive-v1-${{ runner.os }}-${{ steps.pin.outputs.tag }}-${{ hashFiles('hwi-rs/tests/coldcard-sim/Dockerfile', 'hwi-rs/tests/coldcard-sim/*.patch', 'hwi-rs/tests/coldcard-sim/build.sh') }}
          lookup-only: true

      - name: Install podman
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build simulator
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          WORK_DIR: ${{ github.workspace }}/cc-sim-work
          CONTAINER_RUNTIME: podman
        run: bash hwi-rs/tests/coldcard-sim/build.sh

      - name: Sanity-check built simulator
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          test -x cc-sim-work/firmware/unix/coldcard-mpy
          test -f cc-sim-work/firmware/unix/simulator.py

      - name: Tar built tree (excluding .git)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cd cc-sim-work
          tar --exclude='**/.git' -czf "${{ github.workspace }}/coldcard-sim.tar.gz" firmware

      - name: Save simulator archive cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: coldcard-sim.tar.gz
          key: coldcard-sim-archive-v1-${{ runner.os }}-${{ steps.pin.outputs.tag }}-${{ hashFiles('hwi-rs/tests/coldcard-sim/Dockerfile', 'hwi-rs/tests/coldcard-sim/*.patch', 'hwi-rs/tests/coldcard-sim/build.sh') }}

  # ----------------------------------------------------------------------------
  # Same scenario as mock_integration / speculos_integration, but driven
  # against the Coldcard `coldcard-mpy` simulator prepared by `coldcard_sim`.
  # The simulator archive is restored from the shared cache rather than
  # uploaded/downloaded as a per-run artifact.
  # ----------------------------------------------------------------------------
  coldcard_integration:
    name: integration (coldcard simulator)
    needs: [bitcoind_builder, hwi_rs_builder, coldcard_sim]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libevent-dev libcapnp-1.0.1

      - uses: ./.github/actions/setup-bitcoind
      - uses: ./.github/actions/setup-hwi-rs
      - id: coldcard
        uses: ./.github/actions/setup-coldcard-sim

      - name: Coldcard simulator scenario
        env:
          COLDCARD_SIM_DIR: ${{ steps.coldcard.outputs.sim-dir }}
        run: bash hwi-rs/tests/run-core-scenario-coldcard.sh

      - name: Coldcard simulator MuSig2 scenario
        env:
          COLDCARD_SIM_DIR: ${{ steps.coldcard.outputs.sim-dir }}
        run: bash hwi-rs/tests/run-musig-scenario-coldcard.sh

      - name: Dump coldcard simulator log on failure
        if: failure()
        run: |
          find /tmp -maxdepth 4 -name 'coldcard-sim.log' -print -exec tail -n 200 {} \; 2>/dev/null || true

  # ----------------------------------------------------------------------------
  # Drive hwi-rs's MuSig2/BIP388 paths against speculos through Bitcoin Core's
  # external_signer interface. Mirrors speculos_integration but exercises
  # registerpolicy and policy-mode displayaddress instead of the single-sig
  # flow. Reuses the same bitcoind artifact (which already tracks Sjors's
  # MuSig2 branch via bitcoind_builder). The scenario script itself is grown
  # incrementally across the commits that introduce each new subcommand.
  # ----------------------------------------------------------------------------
  speculos_musig_integration:
    name: integration (speculos ledger, musig)
    needs: [bitcoind_builder, ledger_app, hwi_rs_builder]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libevent-dev libcapnp-1.0.1

      - uses: ./.github/actions/setup-bitcoind
      - uses: ./.github/actions/setup-hwi-rs
      - uses: ./.github/actions/setup-ledger-speculos

      - name: MuSig2 scenario (regtest, speculos)
        env:
          LEDGER_APP_ELF: ${{ github.workspace }}/ledger_app/app.elf
          SPECULOS: speculos
        run: bash hwi-rs/tests/run-musig-scenario-speculos.sh

      - name: Dump speculos log on failure
        if: failure()
        run: |
          find /tmp -maxdepth 4 -name 'speculos.log' -print -exec tail -n 200 {} \; 2>/dev/null || true
